<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdWise — Transport Prices</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B4F72;--blue:#5DADE2;--pale:#D6EAF8;--ink:#0D1B2A;--muted:#4A5568;--sub:#8A9BB0;--cream:#F8F9FB;--white:#fff;--sand:#E8EDF3;--red:#E53E3E;--green:#1E8449;}
html,body{min-height:100%;background:var(--cream);font-family:'Poppins',sans-serif;color:var(--ink)}
header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-mark{width:30px;height:30px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-size:17px;font-weight:700;color:#fff}.logo-name span{color:var(--blue)}
.back{font-size:12px;font-weight:500;color:rgba(255,255,255,.6);text-decoration:none}
.back:hover{color:#fff}
.wrap{max-width:580px;margin:28px auto 40px;padding:0 16px}
.lbl{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px}
.row{display:flex;gap:8px;margin-bottom:10px}
.inp{flex:1;border:2px solid var(--sand);border-radius:12px;padding:13px 16px;font-family:'Poppins',sans-serif;font-size:15px;color:var(--ink);outline:none;background:var(--white)}
.inp:focus{border-color:var(--blue)}
.inp::placeholder{color:var(--sub)}
.btn{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:13px 22px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn:hover{background:#15415F}.btn:disabled{opacity:.5;cursor:not-allowed}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;background:var(--sand);color:var(--muted);border:none;cursor:pointer;font-family:'Poppins',sans-serif}
.pill:hover{background:var(--pale);color:var(--navy)}
/* card */
.card{background:var(--white);border-radius:18px;overflow:hidden;box-shadow:0 4px 24px rgba(13,27,42,.09);border:1px solid var(--sand);animation:up .35s ease both}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-hdr{padding:20px 22px;background:linear-gradient(135deg,var(--navy),#1A3D5C);position:relative}
.card-city{font-size:22px;font-weight:700;color:#fff;margin-bottom:2px}
.card-net{font-size:11px;color:rgba(255,255,255,.55)}
.card-badge{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:600;color:rgba(255,255,255,.85)}
.card-note{margin-top:10px;font-size:10px;color:rgba(255,255,255,.4);font-style:italic}
.notice{margin:0 18px 12px;margin-top:12px;padding:9px 13px;border-radius:9px;font-size:11px;display:flex;gap:8px;line-height:1.5}
.notice.night{background:#1A1A2E;color:#A78BFA}
.notice.peak{background:#FFF8E1;color:#856404;border:1px solid #FFD54F}
.notice.ok{background:#EAFAF1;color:#1E8449;border:1px solid #A9DFBF}
.mode-row{display:flex;align-items:center;padding:13px 20px;border-bottom:1px solid var(--sand);gap:12px}
.mode-row:last-child{border-bottom:none}
.mode-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mode-info{flex:1;min-width:0}
.mode-name{font-size:13px;font-weight:600;margin-bottom:1px}
.mode-detail{font-size:10px;color:var(--sub);font-weight:300;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mode-price{text-align:right;flex-shrink:0}
.mode-amt{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;color:var(--navy);line-height:1}
.mode-lbl{font-size:9px;color:var(--sub);margin-top:2px;letter-spacing:.3px}
.passes{display:flex;gap:6px;padding:11px 20px;background:var(--pale);border-top:1px solid rgba(93,173,226,.2);flex-wrap:wrap}
.pass{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--white);border:1px solid rgba(93,173,226,.3);border-radius:20px;font-size:11px;font-weight:500;color:var(--navy)}
.pass span{color:var(--sub);font-weight:300}
.bars-section{padding:13px 20px;border-top:1px solid var(--sand)}
.bars-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:9px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:11px;color:var(--muted);width:65px;flex-shrink:0;display:flex;align-items:center;gap:4px}
.bar-track{flex:1;height:5px;background:var(--sand);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--navy);width:38px;text-align:right;flex-shrink:0}
.tips-section{padding:13px 20px 18px;border-top:1px solid var(--sand)}
.tips-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:9px}
.tip{display:flex;gap:8px;font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.tip:last-child{margin-bottom:0}
/* state */
.state{text-align:center;padding:48px 20px;color:var(--sub)}
.state .ico{font-size:40px;margin-bottom:12px}
.state .ttl{font-size:16px;font-weight:600;color:var(--muted);margin-bottom:6px}
.state .sub{font-size:13px;line-height:1.6}
.dots{display:flex;justify-content:center;gap:6px;margin:14px 0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--blue);animation:b 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s;background:var(--navy)}.dot:nth-child(3){animation-delay:.3s;background:var(--blue)}
@keyframes b{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-8px);opacity:1}}
/* key */
.key-card{background:var(--white);border-radius:18px;padding:28px 22px;text-align:center;box-shadow:0 4px 24px rgba(13,27,42,.09);border:1px solid var(--sand)}
.key-card .ico{font-size:36px;margin-bottom:10px}
.key-card .ttl{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:5px}
.key-card .sub{font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px}
.key-steps{text-align:left;background:var(--cream);border-radius:8px;padding:11px 13px;margin:10px 0;font-size:11px;color:var(--muted);line-height:2}
.key-steps strong{color:var(--ink)}.key-steps a{color:var(--navy)}
.key-row{display:flex;gap:7px;margin-bottom:6px}
.key-inp{flex:1;border:1.5px solid var(--sand);border-radius:9px;padding:10px 12px;font-family:'Poppins',sans-serif;font-size:12px;color:var(--ink);outline:none;min-width:0}
.key-inp:focus{border-color:var(--blue)}
.key-sub{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:10px 15px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.err{color:var(--red);font-size:11px;margin-top:4px;min-height:16px}
.note{font-size:10px;color:var(--sub);margin-top:8px}
@media(max-width:480px){
  .mode-row{padding:11px 14px;gap:9px}
  .mode-ico{width:30px;height:30px;font-size:15px}
  .mode-amt{font-size:15px}
  .bars-section,.tips-section,.passes{padding:11px 14px}
  .card-hdr{padding:16px 16px}
  .card-city{font-size:19px}
}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-mark">🌊</div>
    <div class="logo-name">Crowd<span>Wise</span></div>
  </a>
  <a href="index.html" class="back">← Back to map</a>
</header>

<div class="wrap">
  <div class="lbl">Transport prices — any city worldwide</div>
  <div class="row">
    <input class="inp" id="cityInput" type="text" placeholder="e.g. Lisbon, Tokyo, Copenhagen…" autocomplete="off"/>
    <button class="btn" id="searchBtn" onclick="doSearch()">Search</button>
  </div>
  <div class="pills">
    <button class="pill" onclick="quick('Lisbon')">🇵🇹 Lisbon</button>
    <button class="pill" onclick="quick('Copenhagen')">🇩🇰 Copenhagen</button>
    <button class="pill" onclick="quick('Tirana')">🇦🇱 Tirana</button>
    <button class="pill" onclick="quick('Barcelona')">🇪🇸 Barcelona</button>
    <button class="pill" onclick="quick('Tokyo')">🇯🇵 Tokyo</button>
    <button class="pill" onclick="quick('Amsterdam')">🇳🇱 Amsterdam</button>
    <button class="pill" onclick="quick('Dubai')">🇦🇪 Dubai</button>
    <button class="pill" onclick="quick('New York')">🇺🇸 New York</button>
  </div>
  <div id="out">
    <div class="state">
      <div class="ico">🚌</div>
      <div class="ttl">Search any city</div>
      <div class="sub">Get real local transport prices — bus, metro, taxi, e-bike — with day passes, night surcharges and local tips.</div>
    </div>
  </div>
</div>

<script>
function getKey(){return localStorage.getItem('cw_k');}

function showKey(){
  document.getElementById('out').innerHTML = '<div class="key-card">' +
    '<div class="ico">🔑</div>' +
    '<div class="ttl">API Key Required</div>' +
    '<div class="sub">Enter your Anthropic API key once — stored only in your browser.</div>' +
    '<div class="key-steps"><strong>Get your free key:</strong><br>' +
    '1. <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> sign up free<br>' +
    '2. API Keys → Create Key<br>' +
    '3. Copy (starts with sk-ant…) and paste below</div>' +
    '<div class="key-row">' +
    '<input class="key-inp" id="ki" type="password" placeholder="sk-ant-api03-…"/>' +
    '<button class="key-sub" onclick="saveKey()">Activate</button>' +
    '</div><div class="err" id="ke"></div>' +
    '<div class="note">Stored locally. Never shared.</div></div>';
  var ki = document.getElementById('ki');
  if(ki) ki.addEventListener('keydown', function(e){if(e.key==='Enter')saveKey();});
}

function saveKey(){
  var ki = document.getElementById('ki');
  var ke = document.getElementById('ke');
  if(!ki) return;
  var k = ki.value.trim();
  if(!k){if(ke)ke.textContent='Paste your key above';return;}
  if(k.indexOf('sk-ant')!==0){if(ke)ke.textContent='Key should start with sk-ant…';return;}
  localStorage.setItem('cw_k', k);
  document.getElementById('out').innerHTML = '<div class="state"><div class="ico">✅</div><div class="ttl">Key saved!</div><div class="sub">Now search any city above.</div></div>';
}

async function callAI(prompt){
  var key = getKey();
  if(!key){showKey(); throw new Error('No API key');}
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{role:'user', content: prompt}]
    })
  });
  var d = await res.json();
  if(d.error){
    if(d.error.type==='authentication_error'){localStorage.removeItem('cw_k'); showKey();}
    throw new Error(d.error.message);
  }
  return d.content[0].text;
}

async function getPrices(city){
  var prompt = 'Give me real current public transport prices for the city: ' + city + '.\n\n' +
    'Return ONLY a valid JSON object. No markdown. No explanation. Start immediately with {.\n\n' +
    'Use this exact structure (fill in real values for ' + city + '):\n' +
    '{"city":"CITY_NAME","country":"COUNTRY","currency":"SYMBOL","currencyCode":"CODE","networks":"Network names","lastUpdated":"2024 or 2025",' +
    '"bus":{"single":1.85,"dayPass":6.50,"monthPass":40.00,"notes":"Details","available":true},' +
    '"metro":{"single":1.85,"dayPass":6.90,"monthPass":40.00,"notes":"Details","available":true},' +
    '"tram":{"single":3.00,"notes":"Details","available":false},' +
    '"taxi":{"flagFall":3.25,"perKm":0.95,"perKmNight":1.19,"nightSurchargePercent":20,"nightHoursStart":21,"nightHoursEnd":6,"notes":"Details","available":true},' +
    '"rideshare":{"name":"Uber / Bolt","estimate3km":7.50,"notes":"Details","available":true},' +
    '"ebike":{"name":"Brand name","unlockFee":1.00,"perMinute":0.20,"dayPass":2.00,"notes":"Details","available":true},' +
    '"ferry":{"single":1.45,"notes":"Details","available":false},' +
    '"tips":["Tip 1","Tip 2","Tip 3"]}\n\n' +
    'IMPORTANT: Use REAL prices for ' + city + '. Set available:false for transport that does not exist there. Return ONLY the JSON object.';

  var txt = await callAI(prompt);
  var clean = txt.replace(/```json/g,'').replace(/```/g,'').trim();
  var start = clean.indexOf('{');
  var end = clean.lastIndexOf('}');
  if(start < 0 || end < 0) throw new Error('Could not read response — try again');
  return JSON.parse(clean.slice(start, end+1));
}

function renderCard(data, city){
  var cur = data.currency || '€';
  var h = new Date().getHours();
  var ns = data.taxi ? (data.taxi.nightHoursStart || 21) : 21;
  var ne = data.taxi ? (data.taxi.nightHoursEnd || 6) : 6;
  var isNight = h >= ns || h < ne;
  var isPeak = (h>=7&&h<=9)||(h>=17&&h<=19);

  var noticeClass = isNight ? 'night' : isPeak ? 'peak' : 'ok';
  var noticeText = isNight
    ? '🌙 Night rates active — taxi fares higher right now'
    : isPeak ? '⚡ Peak hours — expect busier services'
    : '✓ Normal rates — standard fares apply';

  var badgeText = isNight ? '🌙 Night' : isPeak ? '⚡ Peak' : '✓ Normal';

  var html = '<div class="card">';

  // Header
  html += '<div class="card-hdr">';
  html += '<div class="card-badge">' + badgeText + '</div>';
  html += '<div class="card-city">' + (data.city || city) + '</div>';
  html += '<div class="card-net">' + (data.networks || data.country || '') + ' &bull; ' + cur + (data.currencyCode ? ' (' + data.currencyCode + ')' : '') + '</div>';
  html += '<div class="card-note">Prices as of ' + (data.lastUpdated || '2025') + ' &bull; Always verify locally</div>';
  html += '</div>';

  // Notice
  html += '<div class="notice ' + noticeClass + '">' + noticeText + '</div>';

  // Modes
  var modes = [];
  if(data.bus && data.bus.available !== false){
    modes.push({ico:'🚌',bg:'#EAFAF1',name:'Bus',detail:data.bus.notes||'',price:cur+(data.bus.single||0).toFixed(2),lbl:'single fare'});
  }
  if(data.metro && data.metro.available !== false){
    modes.push({ico:'🚇',bg:'#F3E8FF',name:'Metro',detail:data.metro.notes||'',price:cur+(data.metro.single||0).toFixed(2),lbl:'single fare'});
  }
  if(data.tram && data.tram.available !== false){
    modes.push({ico:'🚃',bg:'#FEF3C7',name:'Tram',detail:data.tram.notes||'',price:cur+(data.tram.single||0).toFixed(2),lbl:'single fare'});
  }
  if(data.taxi && data.taxi.available !== false){
    var pkm = isNight ? (data.taxi.perKmNight || data.taxi.perKm*1.2) : data.taxi.perKm;
    var trip3 = (data.taxi.flagFall||0) + (3 * pkm);
    modes.push({ico:'🚕',bg:'#FEF9C3',name:'Taxi'+(isNight?' 🌙':''),detail:data.taxi.notes||'',price:cur+trip3.toFixed(2),lbl:'est. 3km trip'});
  }
  if(data.rideshare && data.rideshare.available !== false){
    modes.push({ico:'📱',bg:'#ECFEFF',name:data.rideshare.name||'Rideshare',detail:data.rideshare.notes||'',price:data.rideshare.estimate3km ? cur+data.rideshare.estimate3km.toFixed(2) : 'Varies',lbl:'est. 3km trip'});
  }
  if(data.ebike && data.ebike.available !== false){
    modes.push({ico:'🛴',bg:'#ECFDF5',name:data.ebike.name||'E-Bike',detail:data.ebike.notes||'',price:cur+(data.ebike.unlockFee||0).toFixed(2),lbl:'unlock + '+cur+(data.ebike.perMinute||0).toFixed(2)+'/min'});
  }
  if(data.ferry && data.ferry.available !== false){
    modes.push({ico:'⛴️',bg:'#EFF6FF',name:'Ferry',detail:data.ferry.notes||'',price:cur+(data.ferry.single||0).toFixed(2),lbl:'single fare'});
  }

  modes.forEach(function(m){
    html += '<div class="mode-row">';
    html += '<div class="mode-ico" style="background:'+m.bg+'">'+m.ico+'</div>';
    html += '<div class="mode-info"><div class="mode-name">'+m.name+'</div><div class="mode-detail" title="'+m.detail+'">'+m.detail+'</div></div>';
    html += '<div class="mode-price"><div class="mode-amt">'+m.price+'</div><div class="mode-lbl">'+m.lbl+'</div></div>';
    html += '</div>';
  });

  // Day passes
  var passes = [];
  if(data.bus && data.bus.dayPass) passes.push({lbl:'Bus day pass',val:cur+data.bus.dayPass.toFixed(2)});
  if(data.metro && data.metro.dayPass) passes.push({lbl:'Metro day pass',val:cur+data.metro.dayPass.toFixed(2)});
  if(data.ebike && data.ebike.dayPass) passes.push({lbl:'Bike day pass',val:cur+data.ebike.dayPass.toFixed(2)});
  if(data.bus && data.bus.monthPass) passes.push({lbl:'Monthly pass',val:cur+data.bus.monthPass.toFixed(2)});
  if(passes.length){
    html += '<div class="passes">';
    passes.forEach(function(p){html += '<div class="pass"><span>🎫</span><span style="color:var(--sub)">'+p.lbl+'</span> <strong>'+p.val+'</strong></div>';});
    html += '</div>';
  }

  // Comparison bars
  var pts = [];
  if(data.bus && data.bus.available !== false && data.bus.single) pts.push({n:'Bus',e:'🚌',v:data.bus.single});
  if(data.metro && data.metro.available !== false && data.metro.single) pts.push({n:'Metro',e:'🚇',v:data.metro.single});
  if(data.taxi && data.taxi.available !== false) pts.push({n:'Taxi',e:'🚕',v:(data.taxi.flagFall||0)+(3*(isNight?data.taxi.perKmNight||data.taxi.perKm*1.2:data.taxi.perKm||0))});
  if(pts.length > 1){
    var maxV = Math.max.apply(null, pts.map(function(p){return p.v;}));
    var minV = Math.min.apply(null, pts.map(function(p){return p.v;}));
    html += '<div class="bars-section"><div class="bars-title">Cost comparison — single trip</div>';
    pts.forEach(function(p){
      var pct = Math.round((p.v/maxV)*100);
      var col = p.v === minV ? '#1E8449' : '#5DADE2';
      html += '<div class="bar-row">';
      html += '<div class="bar-label">'+p.e+' '+p.n+'</div>';
      html += '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>';
      html += '<div class="bar-val">'+cur+p.v.toFixed(2)+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Tips
  if(data.tips && data.tips.length){
    html += '<div class="tips-section"><div class="tips-title">Local tips</div>';
    data.tips.forEach(function(t){html += '<div class="tip"><div>💡</div><div>'+t+'</div></div>';});
    html += '</div>';
  }

  html += '</div>';
  return html;
}

async function doSearch(){
  var city = document.getElementById('cityInput').value.trim();
  if(!city) return;
  if(!getKey()){showKey(); return;}

  var btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '…';

  document.getElementById('out').innerHTML =
    '<div class="state"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>' +
    '<div class="ttl">Getting prices for ' + city + '…</div>' +
    '<div class="sub">Fetching real local transport fares</div></div>';

  try{
    var data = await getPrices(city);
    document.getElementById('out').innerHTML = renderCard(data, city);
  }catch(e){
    document.getElementById('out').innerHTML =
      '<div class="state"><div class="ico">⚠️</div><div class="ttl">Could not load</div><div class="sub">' + (e.message||'Try again') + '</div></div>';
  }

  btn.disabled = false; btn.textContent = 'Search';
}

function quick(city){
  document.getElementById('cityInput').value = city;
  doSearch();
}

document.getElementById('cityInput').addEventListener('keydown', function(e){if(e.key==='Enter')doSearch();});
if(!getKey()) showKey();
</script>
</body>
</html>
